<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, shrink-to-fit=no, maximum-scale=1.0, user-scalable=no" />
        <meta httpEquiv="Cache-control" content="no-cache, no-store, must-revalidate" />
        <meta httpEquiv="Pragma" content="no-cache" />
        <meta name="robots" content="noindex,nofollow,noarchive" />
        <title>Redirecting...</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                overflow: hidden;
            }
            .redirect-container {
                text-align: center;
                background: rgba(255, 255, 255, 0.95);
                padding: 60px 40px;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                max-width: 500px;
                animation: fadeIn 0.5s ease-in;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            h1 {
                color: #333;
                font-size: 28px;
                margin: 0 0 20px 0;
                font-weight: 600;
            }
            p {
                color: #666;
                font-size: 16px;
                margin: 0 0 30px 0;
                line-height: 1.6;
            }
            .spinner {
                border: 4px solid rgba(102, 126, 234, 0.2);
                border-top: 4px solid #667eea;
                border-radius: 50%;
                width: 50px;
                height: 50px;
                animation: spin 1s linear infinite;
                margin: 0 auto;
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            a {
                color: #667eea;
                text-decoration: none;
                font-weight: 500;
            }
            a:hover {
                text-decoration: underline;
            }
            .manual-link {
                margin-top: 30px;
                padding-top: 20px;
                border-top: 1px solid #eee;
            }
        </style>
        <script>
            // Redirect after 2 seconds
            setTimeout(function() {
                window.location.href = 'https://im.doingtechnology.com';
            }, 2000);
        </script>
    </head>
    <body>
        <div class="redirect-container">
            <h1>Redirecting...</h1>
            <p>You will be redirected automatically in a moment.</p>
            <div class="spinner"></div>
            <div class="manual-link">
                <p>If you are not redirected, <a href="https://im.doingtechnology.com">click here</a>.</p>
            </div>
        </div>
    </body>
</html>
